services:
  whatsapp-bot:
    build:
      context: .
      dockerfile: Dockerfile.baileys
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      WHATSAPP_PROVIDER: baileys
      BAILEYS_AUTH_PATH: /data/baileys_auth
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/serviceAccountKey.json
    volumes:
      - baileys_auth:/data/baileys_auth
      - ./serviceAccountKey.json:/secrets/serviceAccountKey.json:ro
    restart: unless-stopped

volumes:
  baileys_auth:
