services:
  - type: web
    name: live-studio-whatsapp-bot
    runtime: node
    plan: free
    buildCommand: npm ci --omit=optional
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: WHATSAPP_PROVIDER
        value: baileys
      - key: BAILEYS_AUTH_PATH
        value: /tmp/baileys_auth
      - key: FIREBASE_PROJECT_ID
        value: lifestudio-abf4b
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=460
      - key: BOT_API_KEY
        value: live-studio-wa-2026-secret-key
      - key: OWNER_PHONE
        value: "218926128650"
      - key: BOSS_PHONES
        value: "218926128650,218945068428"
      - key: APP_URL
        value: https://lifestudio-abf4b.web.app
      - key: FIREBASE_SERVICE_ACCOUNT_B64
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
